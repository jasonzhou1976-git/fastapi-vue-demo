name: Build Docker Images

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/fastapi-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/fastapi-frontend:${{ github.sha }}

      - name: Update Kubernetes image tags
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/fastapi-backend:.*|image: ghcr.io/${{ github.repository_owner }}/fastapi-backend:${{ github.sha }}|" k8s/backend.yaml
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/fastapi-frontend:.*|image: ghcr.io/${{ github.repository_owner }}/fastapi-frontend:${{ github.sha }}|" k8s/frontend.yaml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml

          if git diff --cached --quiet; then
            echo "No Kubernetes image tag changes to commit."
          else
            git commit -m "chore: update Kubernetes image tags to ${{ github.sha }}"
            git push
          fi
